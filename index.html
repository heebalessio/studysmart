    <title>StudySmart – KI-Prüfungstrainer</title>
    <meta name="description" content="Generiere KI-Prüfungen aus deinen PDFs und lerne effizient. Läuft komplett im Browser." />

    <script>
      tailwind.config = { darkMode: 'class' }
    </script>

    <!-- React, pdf.js und jsPDF direkt aus dem Browser laden -->

      {

          "react": "https://esm.sh/react@18.3.1",

        }

    <!-- Babel wandelt das JSX direkt im Browser um -->

    <style>
      .app-gradient {
        background-image:
          radial-gradient(60rem 60rem at 110% -10%, rgba(124, 58, 237, 0.12), transparent 60%),

  <body class="bg-zinc-50 text-zinc-900 dark:bg-zinc-950 dark:text-zinc-50 antialiased">
    <div id="root">
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:system-ui;color:#71717a">
        StudySmart wird geladen …
      </div>
    </div>

    <script type="text/babel" data-type="module" data-presets="react">
      import React, { useState, useEffect, useRef, useCallback } from 'react'
      import { createRoot } from 'react-dom/client'
      import * as pdfjsLib from 'pdfjs-dist'
      import { jsPDF } from 'jspdf'

      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://esm.sh/pdfjs-dist@4.7.76/build/pdf.worker.min.mjs'

      /* ------------------------------------------------------------------ */
      /*  Konfiguration                                                     */
      /* ------------------------------------------------------------------ */
      const ANTHROPIC_MODEL = 'claude-opus-4-8' // günstiger: 'claude-haiku-4-5'
      const OPENAI_MODEL = 'gpt-4o-mini'
      const MAX_INPUT_CHARS = 14000
      const PASS_THRESHOLD = 60

      const uid = () =>
        typeof crypto !== 'undefined' && crypto.randomUUID
          ? crypto.randomUUID()
          : Date.now() + '-' + Math.random().toString(16).slice(2)

      /* ------------------------------------------------------------------ */
      /*  Hook: localStorage                                                */
      /* ------------------------------------------------------------------ */
      function useLocalStorage(key, initial) {
        const [value, setValue] = useState(() => {
          try {
            const item = localStorage.getItem(key)
            return item !== null ? JSON.parse(item) : initial
          } catch {
            return initial
          }
        })
        useEffect(() => {
          try {
            localStorage.setItem(key, JSON.stringify(value))
          } catch {}
        }, [key, value])
        return [value, setValue]
      }

      /* ------------------------------------------------------------------ */
      /*  PDF: Text auslesen                                                */
      /* ------------------------------------------------------------------ */
      async function extractTextFromPdf(file) {
        const buf = await file.arrayBuffer()
        const pdf = await pdfjsLib.getDocument({ data: buf }).promise
        let text = ''
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i)
          const content = await page.getTextContent()
          text += content.items.map((it) => it.str).join(' ') + '\n\n'
        }
        return text.replace(/[ \t]+/g, ' ').trim()
      }

      /* ------------------------------------------------------------------ */
      /*  KI: Prüfung generieren                                            */
      /* ------------------------------------------------------------------ */
      function buildSystemPrompt(n) {
        return `Du bist ein erfahrener Prüfungsersteller. Erstelle aus dem gegebenen Lernstoff genau ${n} anspruchsvolle, aber faire Multiple-Choice-Fragen auf Deutsch.

Antworte AUSSCHLIESSLICH mit gültigem JSON in exakt diesem Format – ohne einleitenden Text, ohne Markdown-Codeblöcke:
{
  "questions": [
    { "question": "Fragetext", "options": ["A","B","C","D"], "correctIndex": 0, "explanation": "kurze Begründung" }
  ]
}

Regeln:
- Genau 4 Antwortoptionen je Frage.
- "correctIndex" ist der 0-basierte Index der richtigen Option (0 bis 3).
- Die Fragen müssen sich aus dem gegebenen Text ableiten lassen.`
      }

      async function generateExam({ provider, apiKey, text, numQuestions }) {
        if (!apiKey) throw new Error('Kein API-Schlüssel hinterlegt. Bitte in den Einstellungen eintragen.')
        if (!text || text.trim().length < 50) throw new Error('Zu wenig Text im PDF.')
        const content = text.slice(0, MAX_INPUT_CHARS)
        const raw =
          provider === 'openai'
            ? await callOpenAI({ apiKey, content, numQuestions })
            : await callAnthropic({ apiKey, content, numQuestions })
        return parseQuestions(raw)
      }

      async function callAnthropic({ apiKey, content, numQuestions }) {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'content-type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true',
          },
          body: JSON.stringify({
            model: ANTHROPIC_MODEL,
            max_tokens: 8192,
            system: buildSystemPrompt(numQuestions),
            messages: [{ role: 'user', content: `Hier ist der Lernstoff:\n\n${content}` }],
          }),
        })
        if (!res.ok) throw new Error(await readApiError(res, 'Anthropic'))
        const data = await res.json()
        return data?.content?.[0]?.text ?? ''
      }

      async function callOpenAI({ apiKey, content, numQuestions }) {
        const res = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: { 'content-type': 'application/json', authorization: `Bearer ${apiKey}` },
          body: JSON.stringify({
            model: OPENAI_MODEL,
            response_format: { type: 'json_object' },
            messages: [
              { role: 'system', content: buildSystemPrompt(numQuestions) },
              { role: 'user', content: `Hier ist der Lernstoff:\n\n${content}` },
            ],
          }),
        })
        if (!res.ok) throw new Error(await readApiError(res, 'OpenAI'))
        const data = await res.json()
        return data?.choices?.[0]?.message?.content ?? ''
      }

      async function readApiError(res, provider) {
        let detail = ''
        try {
          const body = await res.json()
          detail = body?.error?.message || JSON.stringify(body)
        } catch {
          detail = await res.text().catch(() => '')
        }
        if (res.status === 401) return `${provider}: Ungültiger API-Schlüssel (401).`
        if (res.status === 429) return `${provider}: Rate-Limit oder Guthaben erschöpft (429).`
        return `${provider}-Fehler (${res.status}): ${detail}`
      }

      // Prüft mit einer minimalen Anfrage, ob der Schlüssel des Nutzers funktioniert.
      async function testConnection({ provider, apiKey }) {
        if (!apiKey) throw new Error('Bitte zuerst einen Schlüssel eingeben.')
        if (provider === 'anthropic') {
          const res = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
              'content-type': 'application/json',
              'x-api-key': apiKey,
              'anthropic-version': '2023-06-01',
              'anthropic-dangerous-direct-browser-access': 'true',
            },
            body: JSON.stringify({ model: ANTHROPIC_MODEL, max_tokens: 1, messages: [{ role: 'user', content: 'Hi' }] }),
          })
          if (!res.ok) throw new Error(await readApiError(res, 'Anthropic'))
        } else {
          const res = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: { 'content-type': 'application/json', authorization: `Bearer ${apiKey}` },
            body: JSON.stringify({ model: OPENAI_MODEL, max_tokens: 1, messages: [{ role: 'user', content: 'Hi' }] }),
          })
          if (!res.ok) throw new Error(await readApiError(res, 'OpenAI'))
        }
        return true
      }

      function parseQuestions(raw) {
        let txt = (raw || '').trim()
        const fence = txt.match(/```(?:json)?\s*([\s\S]*?)```/i)
        if (fence) txt = fence[1].trim()
        let data
        try {
          data = JSON.parse(txt)
        } catch {
          const s = txt.indexOf('{'), e = txt.lastIndexOf('}')
          if (s !== -1 && e > s) data = JSON.parse(txt.slice(s, e + 1))
          else throw new Error('Die KI-Antwort konnte nicht als JSON gelesen werden.')
        }
        const list = Array.isArray(data) ? data : data.questions
        if (!Array.isArray(list) || !list.length) throw new Error('Keine Fragen gefunden.')
        return list.map((q, i) => {
          if (!q || typeof q.question !== 'string' || !Array.isArray(q.options))
            throw new Error(`Frage ${i + 1} hat ein ungültiges Format.`)
          const options = q.options.map(String)
          let c = Number(q.correctIndex)
          if (!Number.isInteger(c) || c < 0 || c >= options.length) c = 0
          return { question: q.question, options, correctIndex: c, explanation: String(q.explanation || '') }
        })
      }

      /* ------------------------------------------------------------------ */
      /*  PDF-Export                                                        */
      /* ------------------------------------------------------------------ */
      function exportExamToPdf(questions, { title = 'Prüfung', withSolutions = false } = {}) {
        const doc = new jsPDF({ unit: 'pt', format: 'a4' })
        const pw = doc.internal.pageSize.getWidth()
        const ph = doc.internal.pageSize.getHeight()
        const margin = 48
        const maxW = pw - margin * 2
        let y = margin
        const space = (lh) => { if (y + lh > ph - margin) { doc.addPage(); y = margin } }
        const write = (text, { size = 11, style = 'normal', indent = 0, gap = 0 } = {}) => {
          doc.setFont('helvetica', style); doc.setFontSize(size)
          const lh = size * 1.35
          for (const line of doc.splitTextToSize(text, maxW - indent)) { space(lh); doc.text(line, margin + indent, y); y += lh }
          y += gap
        }
        write(title, { size: 20, style: 'bold' })
        write(`Erstellt am ${new Date().toLocaleDateString('de-DE')} mit StudySmart` + (withSolutions ? ' · mit Lösungen' : ''), { size: 10, gap: 14 })
        questions.forEach((q, i) => {
          write(`${i + 1}. ${q.question}`, { size: 12, style: 'bold', gap: 2 })
          q.options.forEach((opt, idx) => {
            const ok = withSolutions && idx === q.correctIndex
            write(`${String.fromCharCode(65 + idx)}) ${opt}${ok ? '   (richtig)' : ''}`, { size: 11, style: ok ? 'bold' : 'normal', indent: 16 })
          })
          if (withSolutions && q.explanation) write(`Begründung: ${q.explanation}`, { size: 10, style: 'italic', indent: 16 })
          y += 10
        })
        doc.save((title.trim().replace(/\s+/g, '_').toLowerCase() || 'pruefung') + '.pdf')
      }

      /* ------------------------------------------------------------------ */
      /*  Icons (Inline-SVG, MIT, lucide)                                   */
      /* ------------------------------------------------------------------ */
      const Svg = ({ d, paths, className = 'h-5 w-5', ...p }) => (
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...p}>
          {d && <path d={d} />}
          {paths}
        </svg>
      )
      const I = {
        gear: (p) => <Svg {...p} paths={<><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" /><circle cx="12" cy="12" r="3" /></>} />,
        sun: (p) => <Svg {...p} paths={<><circle cx="12" cy="12" r="4" /><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" /></>} />,
        moon: (p) => <Svg {...p} d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />,
        upload: (p) => <Svg {...p} paths={<><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242" /><path d="M12 12v9" /><path d="m16 16-4-4-4 4" /></>} />,
        sparkles: (p) => <Svg {...p} d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .962 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.962 0Z" />,
        check: (p) => <Svg {...p} d="M20 6 9 17l-5-5" />,
        x: (p) => <Svg {...p} paths={<><path d="M18 6 6 18" /><path d="m6 6 12 12" /></>} />,
        trophy: (p) => <Svg {...p} paths={<><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" /><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" /><path d="M4 22h16" /><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22" /><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22" /><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z" /></>} />,
        download: (p) => <Svg {...p} paths={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><path d="M7 10l5 5 5-5" /><path d="M12 15V3" /></>} />,
        left: (p) => <Svg {...p} d="m15 18-6-6 6-6" />,
        right: (p) => <Svg {...p} d="m9 18 6-6-6-6" />,
        file: (p) => <Svg {...p} paths={<><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z" /><path d="M14 2v4a2 2 0 0 0 2 2h4" /><path d="M16 13H8M16 17H8M10 9H8" /></>} />,
        trash: (p) => <Svg {...p} paths={<><path d="M3 6h18" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /></>} />,
        cap: (p) => <Svg {...p} paths={<><path d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z" /><path d="M22 10v6" /><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5" /></>} />,
        eye: (p) => <Svg {...p} paths={<><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" /><circle cx="12" cy="12" r="3" /></>} />,
        eyeOff: (p) => <Svg {...p} paths={<><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" /><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" /><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" /><path d="m2 2 20 20" /></>} />,
        alert: (p) => <Svg {...p} paths={<><circle cx="12" cy="12" r="10" /><path d="M12 8v4M12 16h.01" /></>} />,
        target: (p) => <Svg {...p} paths={<><circle cx="12" cy="12" r="10" /><circle cx="12" cy="12" r="6" /><circle cx="12" cy="12" r="2" /></>} />,
        award: (p) => <Svg {...p} paths={<><path d="m15.477 12.89 1.515 8.526a.5.5 0 0 1-.81.47l-3.58-2.687a1 1 0 0 0-1.197 0l-3.586 2.686a.5.5 0 0 1-.81-.469l1.514-8.526" /><circle cx="12" cy="8" r="6" /></>} />,
        book: (p) => <Svg {...p} d="M12 7v14M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z" />,
        loader: (p) => <Svg {...p} d="M21 12a9 9 0 1 1-6.219-8.56" className={(p.className || 'h-5 w-5') + ' animate-spin'} />,
      }

      /* ------------------------------------------------------------------ */
      /*  Style-Bausteine                                                   */
      /* ------------------------------------------------------------------ */
      const card = 'rounded-xl border border-zinc-200 bg-white shadow-sm dark:border-zinc-800 dark:bg-zinc-900'
      const btn = {
        primary: 'inline-flex items-center justify-center gap-2 rounded-lg bg-violet-600 px-4 h-10 text-sm font-medium text-white hover:bg-violet-700 disabled:opacity-50 disabled:pointer-events-none transition-colors',
        outline: 'inline-flex items-center justify-center gap-2 rounded-lg border border-zinc-200 bg-white px-4 h-10 text-sm font-medium hover:bg-zinc-50 dark:border-zinc-700 dark:bg-zinc-900 dark:hover:bg-zinc-800 disabled:opacity-50 disabled:pointer-events-none transition-colors',
        ghost: 'inline-flex items-center justify-center gap-2 rounded-lg px-3 h-9 text-sm font-medium hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors',
      }

      /* ------------------------------------------------------------------ */
      /*  Komponenten                                                       */
      /* ------------------------------------------------------------------ */
      function Spinner({ label, sub }) {
        return (
          <div className="flex flex-col items-center justify-center gap-4 py-10 text-center">
            <div className="relative">
              <div className="absolute inset-0 animate-ping rounded-full bg-violet-500/20" />
              <div className="relative flex h-16 w-16 items-center justify-center rounded-full bg-violet-500/10 text-violet-600">
                <I.loader className="h-8 w-8" />
              </div>
            </div>
            <div>
              <p className="flex items-center justify-center gap-2 font-medium"><I.sparkles className="h-4 w-4 text-violet-600" />{label}</p>
              {sub && <p className="mt-1 text-sm text-zinc-500">{sub}</p>}
            </div>
          </div>
        )
      }

      function StatCard({ icon: Icon, label, value, accent }) {
        return (
          <div className={card}>
            <div className="flex items-center gap-4 p-5">
              <div className={'flex h-12 w-12 shrink-0 items-center justify-center rounded-xl ' + accent}><Icon className="h-6 w-6" /></div>
              <div className="min-w-0"><p className="truncate text-sm text-zinc-500">{label}</p><p className="text-2xl font-bold tracking-tight">{value}</p></div>
            </div>
          </div>
        )
      }

      function Dashboard({ history, onClear }) {
        const total = history.length
        const avg = total ? Math.round(history.reduce((s, h) => s + h.percentage, 0) / total) : 0
        const best = total ? Math.max(...history.map((h) => h.percentage)) : 0
        const recent = [...history].slice(-5).reverse()
        return (
          <section className="space-y-6">
            <div className="grid grid-cols-1 gap-4 sm:grid-cols-3">
              <StatCard icon={I.book} label="Absolvierte Prüfungen" value={total} accent="bg-violet-500/10 text-violet-600" />
              <StatCard icon={I.target} label="Durchschnitt" value={avg + '%'} accent="bg-blue-500/10 text-blue-500" />
              <StatCard icon={I.award} label="Beste Punktzahl" value={best + '%'} accent="bg-emerald-500/10 text-emerald-500" />
            </div>
            <div className={card}>
              <div className="flex items-center justify-between p-6 pb-2">
                <h2 className="font-semibold">Letzte Aktivität</h2>
                {total > 0 && <button className={btn.ghost + ' text-zinc-500'} onClick={onClear}><I.trash className="h-4 w-4" />Verlauf löschen</button>}
              </div>
              <div className="p-6 pt-2">
                {total === 0 ? (
                  <div className="flex flex-col items-center gap-1 py-8 text-center text-zinc-500">
                    <I.sparkles className="mb-1 h-8 w-8 opacity-40" />
                    <p>Noch keine Prüfungen absolviert.</p>
                    <p className="text-sm">Lade unten ein PDF hoch und starte deine erste Prüfung!</p>
                  </div>
                ) : (
                  <ul className="divide-y divide-zinc-200 dark:divide-zinc-800">
                    {recent.map((h) => (
                      <li key={h.id} className="flex items-center justify-between gap-4 py-3">
                        <div className="min-w-0"><p className="truncate font-medium">{h.title}</p><p className="text-xs text-zinc-500">{new Date(h.date).toLocaleString('de-DE')}</p></div>
                        <div className="flex items-center gap-3">
                          <span className="text-sm text-zinc-500">{h.score}/{h.total}</span>
                          <span className={'rounded-full px-2.5 py-1 text-sm font-semibold ' + (h.percentage >= PASS_THRESHOLD ? 'bg-emerald-500/10 text-emerald-600' : 'bg-red-500/10 text-red-500')}>{h.percentage}%</span>
                        </div>
                      </li>
                    ))}
                  </ul>
                )}
              </div>
            </div>
          </section>
        )
      }

      function Generator({ settings, onExamReady, onOpenSettings }) {
        const [file, setFile] = useState(null)
        const [text, setText] = useState('')
        const [num, setNum] = useState(5)
        const [dragging, setDragging] = useState(false)
        const [status, setStatus] = useState('idle')
        const [error, setError] = useState('')
        const inputRef = useRef(null)
        const hasKey = Boolean(settings.apiKey)

        const handleFile = useCallback(async (sel) => {
          setError('')
          if (!sel) return
          if (sel.type !== 'application/pdf' && !sel.name.toLowerCase().endsWith('.pdf')) { setError('Bitte lade eine PDF-Datei hoch.'); return }
          setFile(sel); setText(''); setStatus('extracting')
          try {
            const t = await extractTextFromPdf(sel)
            if (t.length < 50) setError('Kaum Text gefunden. Ist das PDF evtl. ein gescanntes Bild?')
            setText(t)
          } catch (e) { console.error(e); setError('Das PDF konnte nicht gelesen werden.') }
          finally { setStatus('idle') }
        }, [])

        const generate = async () => {
          setError('')
          if (!hasKey) { onOpenSettings(); return }
          setStatus('generating')
          try {
            const qs = await generateExam({ provider: settings.provider, apiKey: settings.apiKey, text, numQuestions: num })
            onExamReady(qs, (file?.name || 'Prüfung').replace(/\.pdf$/i, ''))
          } catch (e) { console.error(e); setError(e.message || 'Generierung fehlgeschlagen.') }
          finally { setStatus('idle') }
        }

        if (status === 'generating')
          return <div className={card + ' p-2'}><Spinner label="Deine Prüfung wird erstellt …" sub="Die KI analysiert den Text. Das dauert meist 10–30 Sekunden." /></div>

        return (
          <div className={card}>
            <div className="space-y-1.5 p-6 pb-2">
              <h2 className="flex items-center gap-2 font-semibold"><I.sparkles className="h-4 w-4 text-violet-600" />Neue Prüfung erstellen</h2>
              <p className="text-sm text-zinc-500">Lade ein PDF mit deinem Lernstoff hoch – die KI erstellt daraus Multiple-Choice-Fragen.</p>
            </div>
            <div className="space-y-4 p-6 pt-2">
              <div role="button" tabIndex={0}
                onClick={() => inputRef.current?.click()}
                onKeyDown={(e) => (e.key === 'Enter' || e.key === ' ') && inputRef.current?.click()}
                onDragOver={(e) => { e.preventDefault(); setDragging(true) }}
                onDragLeave={() => setDragging(false)}
                onDrop={(e) => { e.preventDefault(); setDragging(false); handleFile(e.dataTransfer.files?.[0]) }}
                className={'flex cursor-pointer flex-col items-center justify-center gap-3 rounded-xl border-2 border-dashed p-8 text-center transition-colors ' + (dragging ? 'border-violet-500 bg-violet-500/5' : 'border-zinc-300 hover:border-violet-400 hover:bg-zinc-50 dark:border-zinc-700 dark:hover:bg-zinc-800/50')}>
                <input ref={inputRef} type="file" accept="application/pdf,.pdf" className="hidden" onChange={(e) => handleFile(e.target.files?.[0])} />
                <div className="flex h-12 w-12 items-center justify-center rounded-full bg-violet-500/10 text-violet-600"><I.upload className="h-6 w-6" /></div>
                <div><p className="font-medium">PDF hierher ziehen oder klicken</p><p className="text-sm text-zinc-500">Nur .pdf-Dateien</p></div>
              </div>

              {status === 'extracting' && <div className="flex items-center gap-2 text-sm text-zinc-500"><I.loader className="h-4 w-4 text-violet-600" />Text wird aus dem PDF ausgelesen …</div>}

              {file && status !== 'extracting' && (
                <div className="flex items-center justify-between gap-3 rounded-lg border border-zinc-200 bg-zinc-50 p-3 dark:border-zinc-800 dark:bg-zinc-800/40">
                  <div className="flex min-w-0 items-center gap-3">
                    <I.file className="h-5 w-5 shrink-0 text-violet-600" />
                    <div className="min-w-0"><p className="truncate text-sm font-medium">{file.name}</p>{text && <p className="flex items-center gap-1 text-xs text-emerald-600"><I.check className="h-3 w-3" />{text.length.toLocaleString('de-DE')} Zeichen ausgelesen</p>}</div>
                  </div>
                  <button className={btn.ghost + ' h-8 w-8 px-0'} onClick={() => { setFile(null); setText(''); setError('') }}><I.x className="h-4 w-4" /></button>
                </div>
              )}

              <div className="flex flex-wrap items-center gap-2">
                <span className="text-sm text-zinc-500">Anzahl Fragen:</span>
                {[5, 8, 10].map((n) => (
                  <button key={n} className={(num === n ? btn.primary : btn.outline) + ' h-8 px-3 text-xs'} onClick={() => setNum(n)}>{n}</button>
                ))}
              </div>

              {!hasKey && (
                <button onClick={onOpenSettings} className="flex w-full items-center gap-2 rounded-lg border border-amber-500/30 bg-amber-500/10 p-3 text-left text-sm text-amber-700 dark:text-amber-400">
                  <I.gear className="h-4 w-4 shrink-0" />Kein API-Schlüssel hinterlegt. Klicke hier, um ihn einzutragen.
                </button>
              )}

              {error && <div className="flex items-start gap-2 rounded-lg border border-red-500/30 bg-red-500/10 p-3 text-sm text-red-600"><I.alert className="mt-0.5 h-4 w-4 shrink-0" /><span>{error}</span></div>}

              <button className={btn.primary + ' h-11 w-full text-base'} disabled={!text || status === 'extracting'} onClick={generate}><I.sparkles className="h-4 w-4" />Prüfung generieren</button>
            </div>
          </div>
        )
      }

      function SettingsModal({ open, onClose, settings, onSave }) {
        const [provider, setProvider] = useState(settings.provider)
        const [apiKey, setApiKey] = useState(settings.apiKey)
        const [show, setShow] = useState(false)
        const [testing, setTesting] = useState(false)
        const [test, setTest] = useState(null) // { ok, msg }
        useEffect(() => { if (open) { setProvider(settings.provider); setApiKey(settings.apiKey); setShow(false); setTest(null) } }, [open])
        useEffect(() => { setTest(null) }, [provider, apiKey])
        if (!open) return null

        const keyUrl = provider === 'anthropic'
          ? 'https://console.anthropic.com/settings/keys'
          : 'https://platform.openai.com/api-keys'

        const runTest = async () => {
          setTesting(true); setTest(null)
          try {
            await testConnection({ provider, apiKey: apiKey.trim() })
            setTest({ ok: true, msg: 'Verbindung erfolgreich – dein Schlüssel funktioniert!' })
          } catch (e) {
            setTest({ ok: false, msg: e.message || 'Test fehlgeschlagen.' })
          } finally { setTesting(false) }
        }

        return (
          <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
            <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={onClose} />
            <div className={'relative z-10 max-h-[90vh] w-full max-w-lg overflow-y-auto p-6 ' + card}>
              <button className="absolute right-4 top-4 text-zinc-400 hover:text-zinc-700 dark:hover:text-zinc-200" onClick={onClose}><I.x className="h-4 w-4" /></button>
              <h2 className="mb-1 text-lg font-semibold">Einstellungen</h2>
              <p className="mb-5 text-sm text-zinc-500">Jede Person trägt hier ihren eigenen API-Schlüssel ein (BYOK). Er wird nur lokal im Browser gespeichert – alle Kosten laufen über dein eigenes Token-Guthaben.</p>

              <div className="space-y-5">
                <div className="space-y-2">
                  <label className="text-sm font-medium">KI-Anbieter</label>
                  <div className="grid grid-cols-2 gap-3">
                    {[{ id: 'anthropic', label: 'Anthropic', hint: 'Claude' }, { id: 'openai', label: 'OpenAI', hint: 'GPT' }].map((o) => (
                      <button key={o.id} onClick={() => setProvider(o.id)}
                        className={'flex items-center gap-3 rounded-lg border p-3 text-left transition-colors ' + (provider === o.id ? 'border-violet-500 bg-violet-500/5' : 'border-zinc-200 hover:bg-zinc-50 dark:border-zinc-700 dark:hover:bg-zinc-800')}>
                        <span className={'flex h-4 w-4 items-center justify-center rounded-full border ' + (provider === o.id ? 'border-violet-600' : 'border-zinc-400')}>{provider === o.id && <span className="h-2 w-2 rounded-full bg-violet-600" />}</span>
                        <span><span className="block text-sm font-medium">{o.label}</span><span className="block text-xs text-zinc-500">{o.hint}</span></span>
                      </button>
                    ))}
                  </div>
                </div>

                <div className="space-y-2">
                  <div className="flex items-center justify-between">
                    <label className="text-sm font-medium" htmlFor="key">API-Schlüssel</label>
                    <a href={keyUrl} target="_blank" rel="noopener noreferrer" className="text-xs font-medium text-violet-600 hover:underline">Schlüssel erstellen ↗</a>
                  </div>
                  <div className="relative">
                    <input id="key" type={show ? 'text' : 'password'} value={apiKey} autoComplete="off"
                      placeholder={provider === 'anthropic' ? 'sk-ant-...' : 'sk-...'}
                      onChange={(e) => setApiKey(e.target.value)}
                      className="h-10 w-full rounded-md border border-zinc-200 bg-white px-3 pr-10 text-sm outline-none focus:ring-2 focus:ring-violet-500 dark:border-zinc-700 dark:bg-zinc-900" />
                    <button type="button" onClick={() => setShow((s) => !s)} className="absolute right-2 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-zinc-700 dark:hover:text-zinc-200">{show ? <I.eyeOff className="h-4 w-4" /> : <I.eye className="h-4 w-4" />}</button>
                  </div>
                  <button className={btn.outline + ' h-9 w-full'} onClick={runTest} disabled={!apiKey.trim() || testing}>
                    {testing ? <><I.loader className="h-4 w-4" />Teste Verbindung …</> : <><I.check className="h-4 w-4" />Verbindung testen</>}
                  </button>
                  {test && (
                    <div className={'flex items-start gap-2 rounded-lg border p-3 text-sm ' + (test.ok ? 'border-emerald-500/30 bg-emerald-500/10 text-emerald-600' : 'border-red-500/30 bg-red-500/10 text-red-600')}>
                      {test.ok ? <I.check className="mt-0.5 h-4 w-4 shrink-0" /> : <I.alert className="mt-0.5 h-4 w-4 shrink-0" />}
                      <span>{test.msg}</span>
                    </div>
                  )}
                </div>

                <div className="rounded-lg bg-amber-500/10 p-3 text-xs text-amber-700 dark:text-amber-400">
                  <b>Wichtig:</b> Du brauchst einen <b>API-Schlüssel</b> (Pay-as-you-go, Abrechnung pro Token). Ein ChatGPT-Plus- oder Claude-Pro-Abo allein reicht dafür <b>nicht</b> – erstelle den Schlüssel über „Schlüssel erstellen" oben.
                </div>

                <div className="rounded-lg bg-zinc-100 p-3 text-xs text-zinc-500 dark:bg-zinc-800">
                  Dein Schlüssel verlässt deinen Browser nur, um Anfragen direkt an {provider === 'anthropic' ? 'Anthropic' : 'OpenAI'} zu senden – nie an einen StudySmart-Server.
                </div>
              </div>

              <div className="mt-6 flex justify-end gap-2">
                <button className={btn.outline} onClick={onClose}>Abbrechen</button>
                <button className={btn.primary} onClick={() => { onSave({ provider, apiKey: apiKey.trim() }); onClose() }}>Speichern</button>
              </div>
            </div>
          </div>
        )
      }

      function ExamView({ questions, title, onFinish, onCancel }) {
        const [cur, setCur] = useState(0)
        const [answers, setAnswers] = useState(() => Array(questions.length).fill(null))
        const q = questions[cur]
        const answered = answers.filter((a) => a !== null).length
        const select = (idx) => setAnswers((p) => { const n = [...p]; n[cur] = idx; return n })
        const finish = () => {
          const score = answers.reduce((s, a, i) => s + (a === questions[i].correctIndex ? 1 : 0), 0)
          onFinish({ title, questions, answers, score, total: questions.length, percentage: Math.round((score / questions.length) * 100) })
        }
        return (
          <div className="mx-auto max-w-2xl space-y-5">
            <div className="space-y-2">
              <div className="flex items-center justify-between text-sm"><span className="font-medium">Frage {cur + 1} von {questions.length}</span><span className="text-zinc-500">{answered} beantwortet</span></div>
              <div className="h-2.5 w-full overflow-hidden rounded-full bg-zinc-200 dark:bg-zinc-800"><div className="h-full bg-violet-600 transition-all duration-500" style={{ width: (answered / questions.length) * 100 + '%' }} /></div>
            </div>
            <div className={card + ' p-6'}>
              <h2 className="mb-4 text-lg font-semibold leading-snug">{q.question}</h2>
              <div className="space-y-3">
                {q.options.map((opt, idx) => {
                  const sel = answers[cur] === idx
                  return (
                    <button key={idx} onClick={() => select(idx)} className={'flex w-full items-center gap-3 rounded-lg border p-4 text-left transition-colors ' + (sel ? 'border-violet-500 bg-violet-500/5' : 'border-zinc-200 hover:bg-zinc-50 dark:border-zinc-700 dark:hover:bg-zinc-800')}>
                      <span className={'flex h-4 w-4 shrink-0 items-center justify-center rounded-full border ' + (sel ? 'border-violet-600' : 'border-zinc-400')}>{sel && <span className="h-2 w-2 rounded-full bg-violet-600" />}</span>
                      <span className="text-sm"><span className="mr-2 font-semibold text-zinc-400">{String.fromCharCode(65 + idx)}</span>{opt}</span>
                    </button>
                  )
                })}
              </div>
            </div>
            <div className="flex items-center justify-between gap-3">
              <button className={btn.outline} onClick={() => setCur((c) => c - 1)} disabled={cur === 0}><I.left className="h-4 w-4" />Zurück</button>
              {cur === questions.length - 1
                ? <button className={btn.primary} onClick={finish} disabled={answered < questions.length}><I.check className="h-4 w-4" />Auswerten</button>
                : <button className={btn.primary} onClick={() => setCur((c) => c + 1)}>Weiter<I.right className="h-4 w-4" /></button>}
            </div>
            <div className="flex flex-wrap justify-center gap-2">
              {questions.map((_, i) => (
                <button key={i} onClick={() => setCur(i)} className={'flex h-8 w-8 items-center justify-center rounded-md border text-xs font-medium transition-colors ' + (i === cur ? 'border-violet-600 bg-violet-600 text-white' : answers[i] !== null ? 'border-violet-400 bg-violet-500/10 text-violet-600' : 'border-zinc-200 hover:bg-zinc-100 dark:border-zinc-700 dark:hover:bg-zinc-800')}>{i + 1}</button>
              ))}
            </div>
            <div className="text-center"><button className={btn.ghost + ' text-zinc-500'} onClick={onCancel}><I.x className="h-4 w-4" />Prüfung abbrechen</button></div>
          </div>
        )
      }

      function ExamResults({ result, onRestart }) {
        const { title, questions, answers, score, total, percentage } = result
        const passed = percentage >= PASS_THRESHOLD
        return (
          <div className="mx-auto max-w-2xl space-y-6">
            <div className={card + ' overflow-hidden'}>
              <div className={'h-2 ' + (passed ? 'bg-emerald-500' : 'bg-red-500')} />
              <div className="flex flex-col items-center gap-3 py-8 text-center">
                <div className={'flex h-20 w-20 items-center justify-center rounded-full ' + (passed ? 'bg-emerald-500/10 text-emerald-500' : 'bg-red-500/10 text-red-500')}><I.trophy className="h-10 w-10" /></div>
                <div><p className="text-4xl font-bold tracking-tight">{percentage}%</p><p className="text-zinc-500">{score} von {total} Fragen richtig</p></div>
                <p className={'text-sm font-medium ' + (passed ? 'text-emerald-600' : 'text-red-500')}>{passed ? 'Stark! Du hast bestanden. 🎉' : 'Weiter üben – das wird!'}</p>
              </div>
            </div>
            <div className="grid grid-cols-1 gap-3 sm:grid-cols-3">
              <button className={btn.primary} onClick={onRestart}>Zum Dashboard</button>
              <button className={btn.outline} onClick={() => exportExamToPdf(questions, { title, withSolutions: true })}><I.download className="h-4 w-4" />PDF mit Lösungen</button>
              <button className={btn.outline} onClick={() => exportExamToPdf(questions, { title, withSolutions: false })}><I.file className="h-4 w-4" />PDF (nur Fragen)</button>
            </div>
            <div className="space-y-4">
              <h2 className="text-lg font-semibold">Auswertung im Detail</h2>
              {questions.map((q, i) => {
                const ua = answers[i], ok = ua === q.correctIndex
                return (
                  <div key={i} className={card + ' p-6'}>
                    <div className="mb-3 flex items-start gap-3">
                      <div className={'mt-0.5 flex h-6 w-6 shrink-0 items-center justify-center rounded-full ' + (ok ? 'bg-emerald-500/15 text-emerald-600' : 'bg-red-500/15 text-red-500')}>{ok ? <I.check className="h-4 w-4" /> : <I.x className="h-4 w-4" />}</div>
                      <h3 className="font-semibold leading-snug">{i + 1}. {q.question}</h3>
                    </div>
                    <div className="space-y-2">
                      {q.options.map((opt, idx) => {
                        const isC = idx === q.correctIndex, isW = idx === ua && !ok
                        return (
                          <div key={idx} className={'flex items-center gap-2 rounded-md border px-3 py-2 text-sm ' + (isC ? 'border-emerald-500/40 bg-emerald-500/10' : isW ? 'border-red-500/40 bg-red-500/10' : 'border-transparent')}>
                            <span className="font-semibold text-zinc-400">{String.fromCharCode(65 + idx)}</span><span className="flex-1">{opt}</span>
                            {isC && <I.check className="h-4 w-4 text-emerald-600" />}{isW && <I.x className="h-4 w-4 text-red-500" />}
                          </div>
                        )
                      })}
                      {q.explanation && <p className="rounded-md bg-zinc-100 p-3 text-sm text-zinc-600 dark:bg-zinc-800 dark:text-zinc-300"><span className="font-medium text-zinc-900 dark:text-zinc-100">Begründung: </span>{q.explanation}</p>}
                    </div>
                  </div>
                )
              })}
            </div>
          </div>
        )
      }

      function App() {
        const [settings, setSettings] = useLocalStorage('studysmart:settings', { provider: 'anthropic', apiKey: '' })
        const [history, setHistory] = useLocalStorage('studysmart:history', [])
        const [theme, setTheme] = useLocalStorage('studysmart:theme', 'light')
        const [view, setView] = useState('dashboard')
        const [questions, setQuestions] = useState([])
        const [examTitle, setExamTitle] = useState('Prüfung')
        const [result, setResult] = useState(null)
        const [open, setOpen] = useState(false)

        useEffect(() => { document.documentElement.classList.toggle('dark', theme === 'dark') }, [theme])

        const startExam = (qs, title) => { setQuestions(qs); setExamTitle(title); setView('exam') }
        const finishExam = (r) => {
          setResult(r)
          setHistory((p) => [...p, { id: uid(), date: new Date().toISOString(), title: r.title, score: r.score, total: r.total, percentage: r.percentage }])
          setView('results')
        }
        const home = () => { setQuestions([]); setResult(null); setView('dashboard') }

        return (
          <div className="app-gradient min-h-screen">
            <header className="sticky top-0 z-40 border-b border-zinc-200 bg-white/80 backdrop-blur dark:border-zinc-800 dark:bg-zinc-950/80">
              <div className="mx-auto flex h-16 max-w-4xl items-center justify-between px-4">
                <button onClick={home} className="flex items-center gap-2.5 font-bold tracking-tight">
                  <span className="flex h-9 w-9 items-center justify-center rounded-lg bg-violet-600 text-white"><I.cap className="h-5 w-5" /></span>
                  <span className="text-lg">Study<span className="text-violet-600">Smart</span></span>
                </button>
                <div className="flex items-center gap-1">
                  <button className={btn.ghost + ' h-9 w-9 px-0'} onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')} aria-label="Design wechseln">{theme === 'dark' ? <I.sun className="h-5 w-5" /> : <I.moon className="h-5 w-5" />}</button>
                  <button className={btn.ghost + ' h-9 w-9 px-0'} onClick={() => setOpen(true)} aria-label="Einstellungen"><I.gear className="h-5 w-5" /></button>
                </div>
              </div>
            </header>

            <main className="mx-auto max-w-4xl px-4 py-8">
              {view === 'dashboard' && (
                <div className="space-y-8">
                  <div><h1 className="text-3xl font-bold tracking-tight">Willkommen zurück 👋</h1><p className="mt-1 text-zinc-500">Lade deinen Lernstoff hoch und teste dein Wissen mit KI-generierten Prüfungen.</p></div>
                  <Dashboard history={history} onClear={() => setHistory([])} />
                  <Generator settings={settings} onExamReady={startExam} onOpenSettings={() => setOpen(true)} />
                </div>
              )}
              {view === 'exam' && <ExamView questions={questions} title={examTitle} onFinish={finishExam} onCancel={home} />}
              {view === 'results' && result && <ExamResults result={result} onRestart={home} />}
            </main>

            <footer className="mx-auto max-w-4xl px-4 py-8 text-center text-xs text-zinc-400">StudySmart · Läuft komplett in deinem Browser · Kein Backend</footer>

            <SettingsModal open={open} onClose={() => setOpen(false)} settings={settings} onSave={setSettings} />
          </div>
        )
      }

      createRoot(document.getElementById('root')).render(<App />)
    </script>
  </body>
</html>
